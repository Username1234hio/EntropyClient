name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate icon.icns from icon.png
        run: |
          # Install Pillow for reliable PNG resizing
          pip3 install Pillow --quiet

          python3 << 'PYEOF'
          from PIL import Image
          import os, struct, zlib

          img = Image.open("icon.png").convert("RGBA")
          print(f"Original size: {img.size}")

          # Make it square by padding
          w, h = img.size
          size = max(w, h)
          square = Image.new("RGBA", (size, size), (0, 0, 0, 0))
          square.paste(img, ((size - w) // 2, (size - h) // 2))

          os.makedirs("AppIcon.iconset", exist_ok=True)
          sizes = [16, 32, 64, 128, 256, 512, 1024]
          for s in sizes:
              resized = square.resize((s, s), Image.LANCZOS)
              resized.save(f"AppIcon.iconset/icon_{s}x{s}.png")
              print(f"  Wrote {s}x{s}")

          # Copy standard iconset names
          import shutil
          mapping = {
            "icon_16x16.png":    "icon_16x16.png",
            "icon_16x16@2x.png": "icon_32x32.png",
            "icon_32x32.png":    "icon_32x32.png",
            "icon_32x32@2x.png": "icon_64x64.png",
            "icon_128x128.png":  "icon_128x128.png",
            "icon_128x128@2x.png":"icon_256x256.png",
            "icon_256x256.png":  "icon_256x256.png",
            "icon_256x256@2x.png":"icon_512x512.png",
            "icon_512x512.png":  "icon_512x512.png",
            "icon_512x512@2x.png":"icon_1024x1024.png",
          }
          for dst, src in mapping.items():
              shutil.copy(f"AppIcon.iconset/{src}", f"AppIcon.iconset/{dst}")

          print("Iconset ready")
          PYEOF

          iconutil -c icns AppIcon.iconset -o icon.icns
          ls -lh icon.icns

      - name: Build macOS (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
        run: npm run dist:mac

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools

      - name: npm install
        run: npm install

      - name: Patch out autoupdate file generation
        run: |
          node << 'JSEOF'
          const fs = require('fs');
          const path = require('path');
          const searchDirs = [
            'node_modules/electron-builder/out',
            'node_modules/electron-builder-lib/out',
            'node_modules/app-builder-lib/out',
          ];
          let patched = 0;
          for (const dir of searchDirs) {
            if (!fs.existsSync(dir)) continue;
            const files = fs.readdirSync(dir, { recursive: true }).filter(f => f.endsWith('.js'));
            for (const file of files) {
              const full = path.join(dir, file);
              let src = fs.readFileSync(full, 'utf8');
              if (src.includes('adding autoupdate files') || src.includes('addAutoUpdateFiles') || src.includes('blockmap')) {
                const orig = src;
                src = src.replace(/async\s+addAutoUpdateFiles[^}]+\{[^}]+\}/g, 'async addAutoUpdateFiles() { return; }');
                src = src.replace(/await\s+[\w.]+\.addAutoUpdateFiles\([^)]*\)/g, '/* autoupdate disabled */');
                src = src.replace(/"blockmap"/g, '"blockmap-disabled"');
                if (src !== orig) { fs.writeFileSync(full, src); console.log('Patched:', full); patched++; }
              }
            }
          }
          console.log('Total files patched:', patched);
          JSEOF

      - name: Build Linux deb + rpm
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:linux