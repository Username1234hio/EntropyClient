name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:mac

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools

      - name: npm install
        run: npm install

      - name: Patch app-builder to skip blockmap generation
        run: |
          REAL="node_modules/app-builder-bin/linux/x64/app-builder"
          mv "$REAL" "${REAL}.orig"
          printf '#!/bin/bash\nfor arg in "$@"; do\n  if [[ "$arg" == *"blockmap"* ]] || [[ "$arg" == *"zip"* ]]; then\n    exit 0\n  fi\ndone\nexec "$(dirname "$0")/app-builder.orig" "$@"\n' > "$REAL"
          chmod +x "$REAL"
          echo "Wrapper installed"
          cat "$REAL"

      - name: Build Linux deb + rpm
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:linux