name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:mac

  build-linux:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm \
            fakeroot \
            dpkg \
            libarchive-tools \
            icnsutils \
            graphicsmagick \
            python3-pip

      - name: Validate icon.png
        run: |
          pip3 install --quiet Pillow
          python3 - << 'PYEOF'
          from PIL import Image
          import sys, os
          path = 'icon.png'
          if not os.path.exists(path):
              print('ERROR: icon.png missing'); sys.exit(1)
          img = Image.open(path)
          if img.size != (512, 512): img = img.resize((512, 512), Image.LANCZOS)
          if img.mode != 'RGBA': img = img.convert('RGBA')
          img.save(path, 'PNG')
          print(f'icon.png OK: {img.size} {img.mode}')
          PYEOF

      - run: npm install

      - name: Build Linux deb + rpm
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:linux