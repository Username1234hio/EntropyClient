name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG (Intel + Silicon)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:mac

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm \
            fakeroot \
            dpkg \
            libarchive-tools \
            libglib2.0-dev \
            libgtk-3-dev \
            libnss3 \
            libxss1 \
            libasound2 \
            python3-pip

      - name: Install Python imaging
        run: pip3 install Pillow

      - name: Validate and fix icon.png
        run: |
          python3 - << 'PYEOF'
          from PIL import Image
          import sys, os

          path = 'icon.png'
          if not os.path.exists(path):
              print("ERROR: icon.png not found!")
              sys.exit(1)

          img = Image.open(path)
          print(f"Original: {img.size} {img.mode}")

          if img.size != (512, 512):
              print(f"Resizing to 512x512")
              img = img.resize((512, 512), Image.LANCZOS)

          if img.mode != 'RGBA':
              print(f"Converting to RGBA")
              img = img.convert('RGBA')

          img.save(path, 'PNG')
          print(f"icon.png ready: {img.size} {img.mode}")
          PYEOF

      - name: Install node dependencies
        run: npm install

      - name: Build Linux deb + rpm
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:linux