name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate icon.icns from icon.png
        run: |
          # Build a proper .iconset from icon.png using sips, then pack with iconutil
          mkdir -p entropy.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size icon.png --out entropy.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double icon.png --out entropy.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns entropy.iconset -o icon.icns
          echo "Generated icon.icns:"
          ls -lh icon.icns

      - name: Patch app-builder icon converter
        run: |
          # Find the app-builder binary and wrap it to skip icon conversion panics
          AB=$(find node_modules -name 'app-builder' -type f 2>/dev/null | head -1)
          if [ -n "$AB" ]; then
            mv "$AB" "${AB}.orig"
            cat > "$AB" << 'SHEOF'
          #!/bin/bash
          # Skip icon-convert calls that cause panics; pass everything else through
          if [[ "$*" == *"icon-convert"* ]]; then
            echo "icon-convert skipped by wrapper" >&2
            exit 0
          fi
          exec "${BASH_SOURCE[0]}.orig" "$@"
          SHEOF
            chmod +x "$AB"
            echo "Patched app-builder at: $AB"
          else
            echo "app-builder binary not found — skipping patch"
          fi

      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:mac

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools

      - name: npm install
        run: npm install

      - name: Patch out autoupdate file generation
        run: |
          node << 'JSEOF'
          const fs = require('fs');
          const path = require('path');

          // Find and patch the file that triggers "adding autoupdate files"
          // This is in electron-builder's LinuxTargetHelper or similar
          const searchDirs = [
            'node_modules/electron-builder/out',
            'node_modules/electron-builder-lib/out',
            'node_modules/app-builder-lib/out',
          ];

          let patched = 0;
          for (const dir of searchDirs) {
            if (!fs.existsSync(dir)) continue;
            const files = fs.readdirSync(dir, { recursive: true })
              .filter(f => f.endsWith('.js'));
            for (const file of files) {
              const full = path.join(dir, file);
              let src = fs.readFileSync(full, 'utf8');
              // Patch out the autoupdate/blockmap generation call
              if (src.includes('adding autoupdate files') || src.includes('addAutoUpdateFiles') || src.includes('blockmap')) {
                const orig = src;
                // Replace the function that generates autoupdate files with a no-op
                src = src.replace(
                  /async\s+addAutoUpdateFiles[^}]+\{[^}]+\}/g,
                  'async addAutoUpdateFiles() { return; }'
                );
                src = src.replace(
                  /await\s+[\w.]+\.addAutoUpdateFiles\([^)]*\)/g,
                  '/* autoupdate disabled */'
                );
                // Also patch any direct app-builder blockmap calls
                src = src.replace(
                  /"blockmap"/g,
                  '"blockmap-disabled"'
                );
                if (src !== orig) {
                  fs.writeFileSync(full, src);
                  console.log('Patched:', full);
                  patched++;
                }
              }
            }
          }
          console.log(`Total files patched: ${patched}`);
          JSEOF

      - name: Build Linux deb + rpm
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:linux