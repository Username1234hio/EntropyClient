name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build macOS DMG
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:mac

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm \
            fakeroot \
            dpkg \
            libarchive-tools \
            icnsutils \
            graphicsmagick \
            python3-pip

      - name: Ensure icon.png is valid 512x512 RGBA
        run: |
          pip3 install --quiet Pillow
          python3 - << 'PYEOF'
          from PIL import Image
          import sys, os

          path = 'icon.png'
          if not os.path.exists(path):
              print('ERROR: icon.png missing from repo root')
              sys.exit(1)

          try:
              img = Image.open(path)
              img.verify()
          except Exception as e:
              print(f'ERROR: icon.png is corrupt: {e}')
              sys.exit(1)

          img = Image.open(path)
          changed = False

          if img.size != (512, 512):
              print(f'Resizing {img.size} -> (512, 512)')
              img = img.resize((512, 512), Image.LANCZOS)
              changed = True

          if img.mode != 'RGBA':
              print(f'Converting {img.mode} -> RGBA')
              img = img.convert('RGBA')
              changed = True

          if changed:
              img.save(path, 'PNG')

          print(f'icon.png OK: {img.size} {img.mode}')
          PYEOF

      - name: Install node dependencies
        run: npm install

      - name: Build Linux deb + rpm
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:linux