name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate icon.icns from icon.png
        run: |
          mkdir -p AppIcon.iconset
          sips -z 16   16   icon.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32   32   icon.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32   32   icon.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64   64   icon.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128  128  icon.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256  256  icon.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256  256  icon.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512  512  icon.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512  512  icon.png --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o icon.icns
          ls -lh icon.icns

      - name: Build macOS (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
        run: npm run dist:mac

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools

      - name: npm install
        run: npm install

      - name: Patch out autoupdate file generation
        run: |
          node << 'JSEOF'
          const fs = require('fs');
          const path = require('path');
          const searchDirs = [
            'node_modules/electron-builder/out',
            'node_modules/electron-builder-lib/out',
            'node_modules/app-builder-lib/out',
          ];
          let patched = 0;
          for (const dir of searchDirs) {
            if (!fs.existsSync(dir)) continue;
            const files = fs.readdirSync(dir, { recursive: true }).filter(f => f.endsWith('.js'));
            for (const file of files) {
              const full = path.join(dir, file);
              let src = fs.readFileSync(full, 'utf8');
              if (src.includes('adding autoupdate files') || src.includes('addAutoUpdateFiles') || src.includes('blockmap')) {
                const orig = src;
                src = src.replace(/async\s+addAutoUpdateFiles[^}]+\{[^}]+\}/g, 'async addAutoUpdateFiles() { return; }');
                src = src.replace(/await\s+[\w.]+\.addAutoUpdateFiles\([^)]*\)/g, '/* autoupdate disabled */');
                src = src.replace(/"blockmap"/g, '"blockmap-disabled"');
                if (src !== orig) { fs.writeFileSync(full, src); console.log('Patched:', full); patched++; }
              }
            }
          }
          console.log('Total files patched:', patched);
          JSEOF

      - name: Build Linux deb + rpm
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:linux